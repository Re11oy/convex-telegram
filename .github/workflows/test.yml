name: Test and lint
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  check:
    name: Test and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Publish preview package
        run: pnpm exec pkg-pr-new publish || echo "pkg-pr-new failed"

      - name: Test
        run: |
          pnpm test
          pnpm typecheck
          pnpm lint
