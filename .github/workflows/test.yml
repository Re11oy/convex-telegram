name: Test and lint
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  check:
    name: Test and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Node setup
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Publish preview package
        # pkg-pr-new posts preview builds via the workflow token; it is not an
        # npm publish, so trusted publishing does not apply.
        # zizmor: ignore[use-trusted-publishing]
        run: pnpm exec pkg-pr-new publish || echo "pkg-pr-new failed"

      - name: Test
        run: |
          pnpm test
          pnpm typecheck
          pnpm lint
